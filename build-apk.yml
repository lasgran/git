name: Build APK

# Roda automaticamente a cada push na branch main/master,
# e também pode ser disparado manualmente pela aba "Actions" no GitHub
# (botão "Run workflow").
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Instala o Android SDK (compileSdk 34) na máquina do GitHub Actions.
      # Não precisamos ter os scripts gradlew no repositório: esta action
      # já disponibiliza um comando "gradle" pronto para uso.
      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build do APK (debug)
        run: gradle assembleDebug --stacktrace

      - name: Enviar o APK como artefato do build
        uses: actions/upload-artifact@v4
        with:
          name: ControleProducao-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
